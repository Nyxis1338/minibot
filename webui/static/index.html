<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>MiniBot AI机器人管理面板</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h2 style="margin-bottom:20px">MiniBot Web管理后台</h2>

<!-- 机器人启停控制 -->
<div class="card">
<h3>🤖 机器人总控制</h3>
<button class="btn-green" onclick="startBot()">启动机器人WS监听</button>
<button class="btn-red" onclick="stopBot()">停止机器人WS监听</button>
<div id="botStatus" style="margin-top:10px;color:#666">加载状态中...</div>
</div>

<!-- OneBot WS配置 -->
<div class="card">
<h3>⚙️ OneBot WS服务配置</h3>
<label>监听 Host listen_host</label>
<input id="obHost" placeholder="0.0.0.0 局域网可访问 / 127.0.0.1 仅本机">
<label>监听端口 listen_port</label>
<input id="obPort" placeholder="默认6199" type="number">
<label>访问鉴权 Token</label>
<input id="obToken" placeholder="与NapCat反向WS Token保持一致">
<button class="btn-blue" onclick="saveOneBot()">保存OneBot配置</button>
</div>

<!-- 大模型厂商管理 -->
<div class="card">
<h3>🧠 大模型厂商管理</h3>
<div class="row">
<div class="col">
<label>厂商标识（英文不可修改）</label>
<input id="llmName" placeholder="deepseek / glm">
<label>API Key</label>
<input id="llmKey" placeholder="模型服务商密钥">
<label>Base URL</label>
<input id="llmUrl" placeholder="https://api.deepseek.com/v1">
<label>model 模型名称</label>
<input id="llmModel" placeholder="deepseek-chat">
<label>temperature</label>
<input id="llmTemp" value="0.7" step="0.1" type="number">
<label>max_tokens</label>
<input id="llmMaxTok" value="1024" type="number">
<div style="margin:10px 0;">
<button class="btn-blue" onclick="testLLMConnect()">🔍 测试接口连通性</button>
</div>
<button class="btn-green" onclick="saveLLM()">保存模型</button>
<button class="btn-red" onclick="delLLM()">删除当前厂商</button>
</div>
<div class="col">
<h4>已添加厂商列表</h4>
<div id="llmListBox"></div>
</div>
</div>
</div>

<!-- AI人设Prompt管理 -->
<div class="card">
<h3>📝 AI人设Prompt管理</h3>
<div class="row">
<div class="col">
<label>人设名称</label>
<input id="personaName">
<label>系统提示词</label>
<textarea id="personaPrompt"></textarea>
<button class="btn-green" onclick="savePersona()">保存人设</button>
<button class="btn-red" onclick="delPersona()">删除人设</button>
</div>
<div class="col">
<h4>所有人设列表</h4>
<div id="personaListBox"></div>
</div>
</div>
</div>

<!-- QQ群独立规则配置 -->
<div class="card">
<h3>👥 QQ群独立规则配置</h3>
<div class="row">
<div class="col">
<label>目标群号</label>
<input id="editGroupId" placeholder="仅数字">
<label>绑定大模型</label>
<select id="groupBindLLM"></select>
<label>绑定人设Prompt</label>
<select id="groupBindPersona"></select>
<label>随机插话概率(0~1)</label>
<input id="groupProb" type="number" step="0.01" min="0" max="1" value="0.12">
<label>发言冷却时间(秒)</label>
<input id="groupCd" type="number" min="0" value="120">

<div style="margin:8px 0;">
<input type="checkbox" id="switchAtReply">
<label for="switchAtReply">开启@机器人自动回复</label>
</div>
<div style="margin:8px 0;">
<input type="checkbox" id="switchRandomChat">
<label for="switchRandomChat">开启群内随机插话</label>
</div>

<label>对话上下文记忆轮次</label>
<input id="groupCtxLen" type="number" min="1" max="20" value="8" placeholder="建议4-10">

<button class="btn-blue" onclick="saveGroupRule()">保存群配置</button>
<button class="btn-red" onclick="delGroupRule()">删除该群配置</button>
</div>
<div class="col">
<h4>已配置群列表</h4>
<div id="groupListBox"></div>
</div>
</div>
</div>

<!-- Toast弹窗容器 -->
<div class="toast-box" id="toastBox"></div>

<script src="main.js"></script>
</body>
</html>
