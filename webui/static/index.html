<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>MiniBot 配置面板</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h2>MiniBot AI机器人管理面板</h2>

    <!-- 机器人启停 -->
    <div class="card">
        <h3>🤖 机器人总控制</h3>
        <button class="btn-green" onclick="startBot()">启动机器人WS</button>
        <button class="btn-red" onclick="stopBot()">停止机器人WS</button>
        <div id="botStatus" style="margin-top:10px;"></div>
    </div>

    <!-- OneBot WS配置 -->
    <div class="card">
        <h3>⚙️ OneBot WS 连接配置</h3>
        <label>listen_host 监听地址</label>
        <input id="obHost" placeholder="0.0.0.0 / 127.0.0.1">
        <label>listen_port 监听端口</label>
        <input id="obPort" type="number">
        <label>token 鉴权密钥</label>
        <input id="obToken">
        <button class="btn-blue" onclick="saveOneBotConfig()">保存OneBot配置</button>
    </div>

    <!-- 配置备份 -->
    <div class="card">
        <h3>💾 配置导入导出</h3>
        <button class="btn-blue" onclick="exportAllConfig()">导出全部配置</button>
        <label>导入JSON配置文件</label>
        <input type="file" id="importConfigFile" accept=".json" onchange="importConfigFile()">
    </div>

    <!-- 大模型厂商 -->
    <div class="card">
        <h3>💜 大模型厂商配置 (DeepSeek/智谱/通义千问)</h3>
        <button class="btn-green" onclick="openLlmModal()">新增模型厂商</button>
        <div id="llmListWrap"></div>
    </div>

    <!-- 人设库 -->
    <div class="card">
        <h3>🐦 机器人预设人设库</h3>
        <button class="btn-green" onclick="openPersonaModal()">新增人设</button>
        <div id="personaListWrap"></div>
    </div>

    <!-- QQ群规则 -->
    <div class="card">
        <h3>🏯 QQ群独立规则配置（可绑定独立模型+人设）</h3>
        <button class="btn-green" onclick="openGroupModal()">新增群配置</button>
        <div id="groupListWrap"></div>
    </div>
</div>

<!-- LLM弹窗 -->
<div class="modal-mask" id="llmModal">
    <div class="modal-panel">
        <div class="modal-head">
            <h3 id="llmModalTitle">新增模型厂商</h3>
            <span class="modal-close" onclick="closeModal('llmModal')">×</span>
        </div>
        <label>厂商标识（英文，编辑不可改）</label>
        <input id="llmName">
        <label>API Key</label>
        <input id="llmKey">
        <label>Base URL</label>
        <input id="llmUrl">
        <label>model 模型名称</label>
        <input id="llmModel">
        <label>temperature 温度</label>
        <input id="llmTemp" step="0.1" type="number">
        <label>max_tokens 最大输出长度</label>
        <input id="llmMaxTok" type="number">
        <button class="btn-blue" onclick="testLLMConnect()">测试接口连通</button>
        <div style="margin-top:10px;">
            <button class="btn-green" onclick="submitLlmForm()">保存</button>
            <button class="btn-red" onclick="closeModal('llmModal')">取消</button>
        </div>
    </div>
</div>

<!-- 人设弹窗 -->
<div class="modal-mask" id="personaModal">
    <div class="modal-panel">
        <div class="modal-head">
            <h3 id="personaModalTitle">新增人设</h3>
            <span class="modal-close" onclick="closeModal('personaModal')">×</span>
        </div>
        <label>人设名称</label>
        <input id="personaName">
        <label>系统提示词</label>
        <textarea id="personaPrompt"></textarea>
        <div style="margin-top:10px;">
            <button class="btn-green" onclick="submitPersonaForm()">保存</button>
            <button class="btn-red" onclick="closeModal('personaModal')">取消</button>
        </div>
    </div>
</div>

<!-- 群配置弹窗 -->
<div class="modal-mask" id="groupModal">
    <div class="modal-panel">
        <div class="modal-head">
            <h3 id="groupModalTitle">新增群配置</h3>
            <span class="modal-close" onclick="closeModal('groupModal')">×</span>
        </div>
        <label>目标群号</label>
        <input id="editGroupId" type="number">
        <label>绑定大模型</label>
        <select id="groupBindLLM"></select>
        <label>绑定人设</label>
        <select id="groupBindPersona"></select>
        <label>随机插话概率(0~1)</label>
        <input id="groupProb" step="0.01" type="number">
        <label>发言冷却秒数</label>
        <input id="groupCd" type="number">
        <div class="checkbox-row">
            <input type="checkbox" id="switchAtReply">
            <label for="switchAtReply">开启@自动回复</label>
        </div>
        <div class="checkbox-row">
            <input type="checkbox" id="switchRandomChat">
            <label for="switchRandomChat">开启随机插话</label>
        </div>
        <label>上下文记忆轮次</label>
        <input id="groupCtxLen" type="number">
        <div style="margin-top:10px;">
            <button class="btn-green" onclick="submitGroupForm()">保存</button>
            <button class="btn-red" onclick="closeModal('groupModal')">取消</button>
        </div>
    </div>
</div>

<!-- Toast弹窗容器 -->
<div class="toast-box" id="toastBox"></div>

<script src="main.js"></script>
</body>
</html>
